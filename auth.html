<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticação - B2K Visão Executiva</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    
    .auth-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .auth-header {
      margin-bottom: 32px;
      text-align: center;
    }
    
    .auth-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .auth-header p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>🔒 Visão Executiva</h1>
      <p>Migração B2K — BUCS-345</p>
    </div>
    
    <form id="authForm">
      <div class="error" id="errorMsg">Senha incorreta. Tente novamente.</div>
      
      <div class="form-group">
        <label for="password">Senha de Acesso</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Insira a senha" 
          autocomplete="off"
          required
        >
      </div>
      
      <button type="submit">Acessar</button>
    </form>
  </div>

  <script>
    // Senha: B2K2026
    const CORRECT_PASSWORD = 'B2K2026';
    const SESSION_KEY = 'b2k_auth_session';
    const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24 horas
    
    // Verifica se já está autenticado
    function checkAuth() {
      const session = localStorage.getItem(SESSION_KEY);
      if (session) {
        const [token, timestamp] = session.split('|');
        const now = Date.now();
        if (now - parseInt(timestamp) < SESSION_DURATION && token === btoa(CORRECT_PASSWORD)) {
          redirectToContent();
        }
      }
    }
    
    function redirectToContent() {
      // Se há arquivo index.html na raiz, vai pra ele
      // Caso contrário, vai pro GitHub ou outro local
      window.location.href = '/index.html';
    }
    
    document.getElementById('authForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      if (password === CORRECT_PASSWORD) {
        // Salva autenticação na sessão (24h)
        const token = btoa(CORRECT_PASSWORD);
        localStorage.setItem(SESSION_KEY, `${token}|${Date.now()}`);
        redirectToContent();
      } else {
        errorMsg.classList.add('show');
        document.getElementById('password').focus();
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
      }
    });
    
    // Verifica auth ao carregar
    checkAuth();
  </script>
</body>
</html>
